name: Update flake.lock and rust-toolchain.toml
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/update-flake-lock@v28
